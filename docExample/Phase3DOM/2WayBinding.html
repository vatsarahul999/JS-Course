<html>

<head>
    <script>
        document.addEventListener("input", () => {
            const userText = document.getElementById("user_text");// user input to JS
            document.getElementById("text").innerText = userText.value; // JS to DOM
        });

    </script>
</head>

<body>
    <input id="user_text" >
    <p id="text"> </p>
</body>

</html>
