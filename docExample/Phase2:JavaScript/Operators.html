<head>
    <script>
        let a = 10;
        let b = 20;
        // Arthemetic Operators
        console.log(a + b);
        console.log(a - b);
        console.log(a * b);
        console.log(a / b);
        console.log(a % b);
        // Comparision Operators
        console.log(a > b);
        console.log(a < b);
        console.log(a == '10');
        console.log(a === '10');
        console.log(a >= 10);
        // logical operators
        console.log(a > 5 && b < 40);
        console.log(a > 5 && b > 40);
        console.log(a > 5 || b > 40);
        console.log(!(a > 5));
        c = a > 0 ? "a is positive" : "a is O or negative";
        console.log(c);

    </script>
