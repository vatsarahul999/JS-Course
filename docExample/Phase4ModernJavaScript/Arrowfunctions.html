<html>

<head>
    <script>
        // taditional JS function
        function add(a, b) {
            return a + b;
        }

        var c = add(1, 3);
        console.log(c);
        // arrow function
        const add1 = (a, b) => {
            return a + b;
        };
        var c = add1(1, 6);
        console.log(c);
              // arrow function without explict return
        const add2 = (a, b) => a + b;
        var c = add2(1, 56);
        console.log(c);
        // arrow with no args
        const greet = () => console.log("Hello!");
         // arrow with 1 args
        const sq = x => x*x;
        greet();
        console.log(sq(4));
        
        const obj = {
            name: "John Doe",
            show: ()=> console.log(this.name)
        };
        console.log(obj);
        // Angular uses
    </script>
</head>

</html>
