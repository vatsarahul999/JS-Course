<html>

<head>
    <script>
        document.addEventListener("input", () => {
         document.getElementById("live_text_output").innerText = document.getElementById("user_text_input").value; // JS to DOM
        });

    </script>
</head>

<body>
    <input id="user_text_input" >
    <h2 id="live_text_output"> </h2>
</body>

</html>
